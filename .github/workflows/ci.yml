name: CI

on:
  push:
  pull_request:

jobs:
  node:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm test
      - run: npm pack --dry-run
      - run: node bin/aish.js --help
      - run: node bin/aish.js benchmark

  npm-install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm pack
      - run: npm install --global ./agentshell-*.tgz
      - run: |
          repo=$(mktemp -d)
          git -C "$repo" init
          aish inspect "$repo"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: pytest
      - name: Build package
        run: |
          python -m pip install build
          python -m build
